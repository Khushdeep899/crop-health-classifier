name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/crop-health-classifier
            git pull origin main
            docker build -t crop-classifier .
            docker stop crop-api || true
            docker rm crop-api || true
            docker run -d --name crop-api --restart always -p 8000:8000 crop-classifier
            docker image prune -f
